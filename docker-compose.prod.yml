# Production Docker Compose configuration
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file overrides development settings for production deployment:
# - Debug mode disabled
# - Database connection pooling configured
# - Nginx reverse proxy for frontend (HTTPS-ready)
# - Restart policies set to always
# - Resource limits applied

services:
  # ============================================================
  # PostgreSQL — Connection pool sized for production
  # ============================================================
  postgres:
    restart: always
    environment:
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=4MB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c log_min_duration_statement=1000
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================================================
  # Redis — Production memory limits
  # ============================================================
  redis:
    restart: always
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    deploy:
      resources:
        limits:
          memory: 768M

  # ============================================================
  # MinIO — Production settings
  # ============================================================
  minio:
    restart: always
    ports: []  # No exposed ports in production (accessed via internal network)
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================================
  # Skyvern API — Production mode
  # ============================================================
  skyvern:
    restart: always
    ports:
      - "8000:8000"
    environment:
      ENV: production
      LOG_LEVEL: WARNING
      ENABLE_CODE_BLOCK: "false"
      DATABASE_STRING: postgresql+psycopg://skyvern:${POSTGRES_PASSWORD}@postgres:5432/skyvern
      REDIS_URL: redis://redis:6379/0
      # Connection pool settings
      DATABASE_POOL_SIZE: "20"
      DATABASE_MAX_OVERFLOW: "30"
      DATABASE_POOL_TIMEOUT: "30"
      DATABASE_POOL_RECYCLE: "1800"
    deploy:
      resources:
        limits:
          memory: 4G

  # ============================================================
  # Nginx — Reverse proxy with HTTPS support
  # ============================================================
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Mount SSL certificates (not committed to repo)
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      skyvern:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres-data:
  redis-data:
  minio-data:
