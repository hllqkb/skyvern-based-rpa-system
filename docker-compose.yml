services:
  # ============================================================
  # PostgreSQL 14 -- Primary data store
  # ============================================================
  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: skyvern
      POSTGRES_PASSWORD: skyvern
      POSTGRES_DB: skyvern
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyvern"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis 7.x -- Pub/Sub for approvals, caching for dashboard
  # ============================================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # MinIO -- Private object storage for audit screenshots
  # ============================================================
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-finrpa}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-finrpa_secret_2024}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # FinRPA Core -- AI browser automation engine
  # ============================================================
  skyvern:
    image: public.ecr.aws/skyvern/skyvern:latest
    restart: on-failure
    ports:
      - "28000:8000"
      - "26080:6080"
      - "29222:9222"
    volumes:
      - ./artifacts:/data/artifacts
      - ./videos:/data/videos
      - ./har:/data/har
      - ./log:/data/log
    env_file:
      - .env
    environment:
      DATABASE_STRING: postgresql+psycopg://skyvern:skyvern@postgres:5432/skyvern
      BROWSER_TYPE: chromium-headful
      ENABLE_CODE_BLOCK: "true"
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================================
  # FinRPA UI -- Web frontend (local build)
  # ============================================================
  skyvern-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    restart: unless-stopped
    ports:
      - "18080:8080"
      - "19090:9090"
    environment:
      SKYVERN_API_URL: http://skyvern:8000
      SKYVERN_WSS_URL: ws://skyvern:8000
      SKYVERN_ARTIFACT_URL: http://skyvern:8000
    depends_on:
      skyvern:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  minio-data:
